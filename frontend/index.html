<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Control Showroom Digital Twin</title>

    <style>
        #control-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            display: flex;
            gap: 10px;
        }
        #control-panel button {
            padding: 10px 16px;
            font-size: 14px;
            cursor: pointer;
        }
        canvas.webgl {
            position: fixed;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>
    <canvas class = "webgl"></canvas>
    <script type="importmap">
    {
        "imports": {
        "three": "./three.js-master/build/three.module.js",
        "three/addons/": "./three.js-master/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="index.js"></script>

    <div id="control-panel">
        <button id="btn-lamp">Toggle Lamp</button>
        <button id="btn-tv">Toggle TV</button>
    </div>
    <canvas class="webgl"></canvas>
</body>
</html>
