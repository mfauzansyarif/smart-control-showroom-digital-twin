<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Control Showroom Digital Twin</title>

    <style>
        #control-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(0,0,0,0.5);
            padding: 14px 18px;
            border-radius: 8px;
            color: white;
            font-family: sans-serif;
        }
        .device-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .switch {
        position: relative;
        display: inline-block;
        width: 60px;
        height: 34px;
        }

        .switch input {
        opacity: 0;
        width: 0;
        height: 0;
        }

        .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #ccc;
        -webkit-transition: .4s;
        transition: .4s;
        }

        .slider:before {
        position: absolute;
        content: "";
        height: 26px;
        width: 26px;
        left: 4px;
        bottom: 4px;
        background-color: white;
        -webkit-transition: .4s;
        transition: .4s;
        }

        input:checked + .slider {
        background-color: #2196F3;
        }

        input:focus + .slider {
        box-shadow: 0 0 1px #2196F3;
        }

        input:checked + .slider:before {
        -webkit-transform: translateX(26px);
        -ms-transform: translateX(26px);
        transform: translateX(26px);
        }

        .slider.round {
        border-radius: 34px;
        }

        .slider.round:before {
        border-radius: 50%;
        }

        #cctv-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            background: rgba(0,0,0,0.5);
            padding: 14px;
            border-radius: 8px;
            color: white;
            font-family: sans-serif;
            width: 260px;
        }
        #cctv-header {
            margin-bottom: 10px;
            font-size: 14px;
        }
        #cctv-feed {
            width: 100%;
            height: 200px;
            border: none;
            border-radius: 4px;
            background: #000;
        }
    </style>
</head>
<body>
    <canvas class = "webgl"></canvas>
    <script type="importmap">
    {
        "imports": {
        "three": "./three.js-master/build/three.module.js",
        "three/addons/": "./three.js-master/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="index.js"></script>

    <div id="control-panel">
        <div class="device-row">
            <span>Lamp</span>
            <label class="switch">
                <input type="checkbox" id="switch-lamp">
                <span class="slider round"></span>
            </label>
        </div>
        <div class="device-row">
            <span>TV</span>
            <label class="switch">
                <input type="checkbox" id="switch-tv">
                <span class="slider round"></span>
            </label>
        </div>
    </div>

    <div id="cctv-panel">
        <div id="cctv-header">
            <span>CCTV Showroom Cam (RTSP via MediaMTX)</span>
        </div>
        <iframe id="cctv-feed" src="http://localhost:8889/showroom_cam" allow="autoplay"></iframe>
    </div>
</body>
</html>
